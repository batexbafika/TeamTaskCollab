<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - TaskCollab</title>
    <link rel="stylesheet" href="../css/main.css">
    <script>
        // Inline script to highlight the correct nav item
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === 'projects.html') link.classList.add('active');
            });
        });
    </script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--brand)">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                TaskCollab
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="dashboard.html" class="nav-link">Select View</a></li>
                <li class="nav-item"><a href="projects.html" class="nav-link active">Projects</a></li>
                <li class="nav-item"><a href="tasks.html" class="nav-link">Tasks</a></li>
                <li class="nav-item"><a href="users.html" class="nav-link">Team Members</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <header class="top-bar">
                <div class="menu-toggle">Menu</div>
                <div class="nav-user">
                    <span id="userName" class="text-muted">Loading...</span>
                    <button id="logoutBtn" class="btn btn-outline">Sign Out</button>
                </div>
            </header>

            <main class="content-body">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">All Projects</h1>
                        <p class="text-muted">Manage and track your team's initiatives.</p>
                    </div>
                </div>
                <div id="projectsList" class="grid"></div>
            </main>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/projects.js"></script>
</body>

</html>
