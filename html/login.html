<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskCollab</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>
    <div class="auth-container">
        <header class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to manage your tasks and team</p>
        </header>

        <div id="authError"
            style="display:none;background:#fee2e2;color:#991b1b;padding:0.75rem 1rem;border-radius:8px;font-size:0.875rem;font-weight:600;margin-bottom:1rem;">
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <footer class="auth-footer">
            Don't have an account? <a href="register.html">Create one here</a>
        </footer>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
