<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TaskCollab</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>
    <div class="auth-container" style="max-width: 500px;">
        <header class="auth-header">
            <h1>Create Account</h1>
            <p>Join the collaboration platform</p>
        </header>

        <div id="authError"
            style="display:none;background:#fee2e2;color:#991b1b;padding:0.75rem 1rem;border-radius:8px;font-size:0.875rem;font-weight:600;margin-bottom:1rem;">
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label>Address (Optional)</label>
                <input type="text" name="address" placeholder="Bamenda, Cameroon">
            </div>
            <div class="form-group">
                <label>Password (min 8 characters)</label>
                <input type="password" name="password" placeholder="••••••••" minlength="8" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="password_confirmation" placeholder="••••••••" minlength="8" required>
            </div>
            <button type="submit" class="btn-primary">Register Account</button>
        </form>

        <footer class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </footer>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
