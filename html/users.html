<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - TaskCollab</title>
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--brand)">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                TaskCollab
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="dashboard.html" class="nav-link">Select View</a></li>
                <li class="nav-item"><a href="projects.html" class="nav-link">Projects</a></li>
                <li class="nav-item"><a href="tasks.html" class="nav-link">Tasks</a></li>
                <li class="nav-item"><a href="users.html" class="nav-link active">Team Members</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <header class="top-bar">
                <div class="menu-toggle">Menu</div>
                <div class="nav-user">
                    <span id="userName" class="text-muted">Loading...</span>
                    <button id="logoutBtn" class="btn btn-outline">Sign Out</button>
                </div>
            </header>

            <main class="content-body">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Team Members</h1>
                        <p class="text-muted">Connect and collaborate with your colleagues.</p>
                    </div>
                </div>

                <div id="usersList" class="grid"></div>
            </main>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const users = await api.get('/users');
                const list = document.getElementById('usersList');
                list.innerHTML = users.map(u => `
                    <div class="card">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--brand); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.25rem;">
                                ${u.name.charAt(0)}
                            </div>
                            <div>
                                <h3 style="margin: 0; font-size: 1.125rem;">${u.name}</h3>
                                <p class="text-muted" style="margin: 0; font-size: 0.875rem;">${u.email}</p>
                            </div>
                        </div>
                        <div class="mt-4">
                            <span class="badge badge-info">${u.role.replace('_', ' ').toUpperCase()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>

</html>
