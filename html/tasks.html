<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - TaskCollab</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--brand)">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                TaskCollab
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="dashboard.html" class="nav-link">Select View</a></li>
                <li class="nav-item"><a href="projects.html" class="nav-link">Projects</a></li>
                <li class="nav-item"><a href="tasks.html" class="nav-link active">Tasks</a></li>
                <li class="nav-item"><a href="users.html" class="nav-link">Team Members</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <header class="top-bar">
                <div class="menu-toggle">Menu</div>
                <div class="nav-user">
                    <span id="userName" class="text-muted">Loading...</span>
                    <button id="logoutBtn" class="btn btn-outline">Sign Out</button>
                </div>
            </header>

            <main class="content-body">
                <div class="page-header">
                    <div>
                        <h1 class="page-title" id="projectTitle">All Tasks</h1>
                        <p class="text-muted">Track progress and update status.</p>
                    </div>
                    <div id="pmTaskActions" style="display: none;">
                        <button class="btn btn-primary" onclick="showModal('taskModal')">Add New Task</button>
                    </div>
                </div>

                <div id="taskList" class="grid"></div>
            </main>
        </div>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content card">
            <h2>Assign New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" name="title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Assign To</label>
                    <select name="assigned_to" required></select>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" name="deadline" required>
                </div>
                <div class="flex-end">
                    <button type="button" class="btn btn-outline" onclick="closeModal('taskModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Assign Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/tasks.js"></script>
    <script>
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>

</html>
